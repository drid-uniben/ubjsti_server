name: "Task / maintenance"
description: Refactors, chores, documentation, CI improvements, and maintenance work.
title: "task: "
labels:
  - task
body:
  - type: markdown
    attributes:
      value: |
        Use this for maintenance work that isn't a bug or feature.

        Contributors: please follow the claim/disclaim + PR linking flow:
        https://github.com/drid-uniben/drid-intern/blob/staging/CONTRIBUTING.md

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - backend
        - CI / GitHub Actions
        - docs
        - repo maintenance
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be done?
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Checklist (optional)
      placeholder: |
        - [ ] ...
        - [ ] ...

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues to avoid duplicates.
          required: true
