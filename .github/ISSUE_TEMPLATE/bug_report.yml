name: "Bug report"
description: Report something that is broken or incorrect.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        Before you start work on this issue, please read our contribution flow:
        https://github.com/drid-uniben/drid-intern/blob/staging/CONTRIBUTING.md

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part is affected?
      options:
        - frontend (Next.js)
        - backend (Express API)
        - CI / GitHub Actions
        - docs
        - other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the bug?
      placeholder: A clear, concise description.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide exact steps so we can reproduce.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs (server console, browser console) and screenshots.
      render: shell

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Share versions and environment details.
      placeholder: |
        OS:
        Node:
        Browser (if applicable):
        PostgreSQL:
        Commit SHA (optional):

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues to avoid duplicates.
          required: true
